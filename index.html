<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FST Landing Page Editor</title>
<style>
  :root {
    --navy: #12212f;
    --blue: #1f40cb;
    --blue-lt: rgba(31,64,203,0.08);
    --blue-border: rgba(31,64,203,0.22);
    --cream: #f0ede8;
    --gold: #e6a817;
    --text: #12212f;
    --muted: #6b7280;
    --border: rgba(18,33,47,0.11);
    --bg: #f5f3f0;
    --white: #ffffff;
    --red: #dc2626;
    --green: #15803d;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif; background: var(--bg); color: var(--text); font-size: 14px; line-height: 1.5; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

  /* TOP BAR */
  .topbar { height: 52px; background: var(--navy); display: flex; align-items: center; padding: 0 20px; gap: 16px; flex-shrink: 0; border-bottom: 1px solid rgba(255,255,255,0.07); }
  .topbar-logo { font-size: 14px; font-weight: 600; color: #f0ede8; letter-spacing: -0.01em; white-space: nowrap; }
  .topbar-logo span { color: var(--blue); }
  .topbar-sep { width: 1px; height: 20px; background: rgba(255,255,255,0.12); flex-shrink: 0; }
  .topbar-label { font-size: 12px; color: rgba(240,237,232,0.45); white-space: nowrap; }
  .lp-tabs { display: flex; gap: 3px; }
  .lp-tab { padding: 6px 14px; border-radius: 6px; font-size: 12px; font-weight: 500; color: rgba(240,237,232,0.55); cursor: pointer; transition: all 0.15s; white-space: nowrap; border: 1px solid transparent; }
  .lp-tab:hover { background: rgba(255,255,255,0.07); color: rgba(240,237,232,0.85); }
  .lp-tab.active { background: rgba(31,64,203,0.25); color: #fff; border-color: rgba(31,64,203,0.4); }
  .topbar-actions { display: flex; gap: 8px; align-items: center; margin-left: auto; }
  .btn { display: inline-flex; align-items: center; gap: 5px; padding: 6px 13px; border-radius: 6px; font-size: 12px; font-weight: 500; cursor: pointer; border: none; transition: all 0.15s; white-space: nowrap; }
  .btn-primary { background: var(--blue); color: #fff; }
  .btn-primary:hover { background: #1835b0; }
  .btn-ghost { background: rgba(255,255,255,0.08); color: rgba(240,237,232,0.75); border: 1px solid rgba(255,255,255,0.12); }
  .btn-ghost:hover { background: rgba(255,255,255,0.14); color: #fff; }
  .btn-light { background: var(--white); color: var(--text); border: 1px solid var(--border); }
  .btn-light:hover { background: var(--bg); }
  .btn-sm { padding: 4px 10px; font-size: 11px; border-radius: 5px; }

  /* WORKSPACE */
  .workspace { flex: 1; display: flex; overflow: hidden; }

  /* LEFT EDITOR PANEL */
  .editor-panel { width: 300px; flex-shrink: 0; background: var(--white); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
  .editor-panel-header { padding: 12px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
  .editor-panel-title { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.07em; color: var(--muted); }
  .editor-sections { flex: 1; overflow-y: auto; }
  .editor-section { border-bottom: 1px solid var(--border); }
  .editor-section-header { padding: 10px 16px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; user-select: none; }
  .editor-section-header:hover { background: var(--bg); }
  .editor-section-name { font-size: 13px; font-weight: 500; }
  .editor-section-toggle { font-size: 9px; color: var(--muted); transition: transform 0.18s; }
  .editor-section-toggle.open { transform: rotate(90deg); }
  .editor-section-body { padding: 12px 16px; display: none; background: var(--bg); }
  .editor-section-body.open { display: block; }
  .field { margin-bottom: 11px; }
  .field:last-child { margin-bottom: 0; }
  .field label { display: block; font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.07em; color: var(--muted); margin-bottom: 4px; }
  .field input, .field textarea { width: 100%; padding: 6px 9px; border: 1px solid var(--border); border-radius: 5px; font-size: 12px; color: var(--text); background: var(--white); font-family: inherit; outline: none; transition: border-color 0.15s; }
  .field input:focus, .field textarea:focus { border-color: var(--blue); box-shadow: 0 0 0 2px rgba(31,64,203,0.1); }
  .field textarea { resize: vertical; min-height: 56px; line-height: 1.5; }
  .toggle-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .toggle-label { font-size: 12px; color: var(--text); }
  .toggle { width: 30px; height: 17px; background: var(--border); border-radius: 9px; cursor: pointer; position: relative; transition: background 0.2s; flex-shrink: 0; }
  .toggle.on { background: var(--blue); }
  .toggle::after { content: ''; position: absolute; width: 11px; height: 11px; background: #fff; border-radius: 50%; top: 3px; left: 3px; transition: transform 0.2s; box-shadow: 0 1px 2px rgba(0,0,0,0.2); }
  .toggle.on::after { transform: translateX(13px); }

  /* CENTER PREVIEW */
  .preview-panel { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .browser-chrome { background: #e8e6e2; border-bottom: 1px solid #ccc; padding: 8px 12px; display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
  .browser-dots { display: flex; gap: 5px; }
  .browser-dot { width: 10px; height: 10px; border-radius: 50%; }
  .browser-url { flex: 1; background: var(--white); border: 1px solid #ccc; border-radius: 5px; padding: 4px 10px; font-size: 11px; color: var(--muted); font-family: monospace; }
  .browser-body { flex: 1; overflow-y: auto; background: #fff; }

  /* RIGHT NOTES PANEL */
  .notes-panel { width: 240px; flex-shrink: 0; background: var(--white); border-left: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
  .notes-header { padding: 12px 16px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
  .notes-title { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.07em; color: var(--muted); }
  .notes-body { flex: 1; overflow-y: auto; padding: 14px 16px; }
  .strategy-block { margin-bottom: 16px; }
  .strategy-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--blue); margin-bottom: 5px; }
  .strategy-text { font-size: 12px; line-height: 1.65; color: var(--muted); }
  .check-item { display: flex; gap: 7px; align-items: flex-start; margin-bottom: 7px; font-size: 12px; color: var(--muted); line-height: 1.4; }
  .check-icon { flex-shrink: 0; color: var(--green); font-size: 11px; margin-top: 1px; }
  .metric-pills { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 6px; }
  .metric-pill { background: var(--blue-lt); border: 1px solid var(--blue-border); color: var(--blue); font-size: 10px; font-weight: 600; padding: 3px 8px; border-radius: 20px; }

  /* TOAST */
  .toast { position: fixed; bottom: 18px; right: 18px; background: var(--navy); color: #fff; padding: 9px 15px; border-radius: 7px; font-size: 13px; font-weight: 500; z-index: 999; transform: translateY(50px); opacity: 0; transition: all 0.22s; pointer-events: none; }
  .toast.show { transform: translateY(0); opacity: 1; }
  .toast.success { background: var(--green); }

     LANDING PAGE STYLES (prefixed .lp-)
  ═══════════════════════════════════ */

  .lp-nav-logo { font-size: 14px; font-weight: 700; }
  .lp-nav-links { display: flex; gap: 16px; align-items: center; }
  .lp-nav-cta { padding: 7px 15px; border-radius: 6px; font-size: 12px; font-weight: 600; cursor: pointer; }
  .lp-urgency { text-align: center; padding: 9px 20px; font-size: 12px; font-weight: 600; }
  .lp-hero { padding: 50px 40px 46px; }
  .lp-hero-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; align-items: center; }
  .lp-eyebrow { display: inline-block; padding: 4px 12px; border-radius: 100px; font-size: 11px; font-weight: 600; margin-bottom: 15px; }
  .lp-h1 { font-size: 32px; font-weight: 700; line-height: 1.12; margin-bottom: 15px; }
  .lp-sub { font-size: 14px; line-height: 1.68; margin-bottom: 22px; }
  .lp-cta-btn { display: inline-block; padding: 11px 22px; border-radius: 7px; font-size: 13px; font-weight: 600; cursor: pointer; }
  .lp-ghost-link { font-size: 12px; text-decoration: underline; text-underline-offset: 3px; cursor: pointer; margin-left: 12px; }

  .lp-stat-num { font-size: 18px; font-weight: 700; }
  .lp-stat-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.06em; margin-top: 1px; opacity: 0.6; }

  .lp-learn-item { font-size: 12px; display: flex; gap: 7px; margin-bottom: 8px; opacity: 0.85; }
  .lp-quote-callout { border-left: 2px solid; padding: 9px 11px; border-radius: 0 5px 5px 0; font-size: 11px; font-style: italic; margin-top: 13px; opacity: 0.85; }

  .lp-pain-card { border-radius: 8px; padding: 16px; border: 1px solid; }
  .lp-pain-icon { font-size: 17px; margin-bottom: 9px; }
  .lp-pain-title { font-size: 12px; font-weight: 600; margin-bottom: 5px; }

  .lp-testi-name { font-size: 12px; font-weight: 600; }

  .lp-cta-section { padding: 50px 40px; text-align: center; }

  .lp-cta-sub { font-size: 14px; opacity: 0.65; margin-bottom: 24px; }

  .lp-vs-grid { display: grid; grid-template-columns: 1fr 1fr; }
  .lp-vs-bad { border-radius: 8px 0 0 8px; padding: 14px; }

  .lp-vs-head { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 10px; }
  .lp-vs-item { font-size: 11px; margin-bottom: 7px; display: flex; gap: 5px; opacity: 0.75; }

  .lp-outcome-card { border-radius: 7px; padding: 12px; margin-bottom: 8px; border: 1px solid; }
  .lp-outcome-quote { font-size: 11px; font-style: italic; margin-bottom: 5px; opacity: 0.85; }

  .lp-stat-bar-item { flex: 1; padding: 11px 8px; text-align: center; }
  .lp-hero-light { padding: 50px 36px 0; }
  .lp-hero-light-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 38px; align-items: end; }
  .lp-outcome-stack { border-radius: 12px 12px 0 0; padding: 20px; }
</style>
</head>

function sec(title, bodyHTML) {
  return `<div class="editor-section">
    <div class="editor-section-header" onclick="toggleSec(this)">
      <span class="editor-section-name">${title}</span>
      <span class="editor-section-toggle">▶</span>

    <div class="editor-section-body">${bodyHTML}</div>
  </div>`;
}
function f(label, path, value, ta=false) {
  const v = (value||'').toString();
  if (ta) return `<div class="field"><label>${label}</label><textarea data-path="${path}" oninput="liveEdit(this)">${v.replace(/</g,'&lt;')}</textarea></div>`;
  return `<div class="field"><label>${label}</label><input type="text" data-path="${path}" value="${v.replace(/"/g,'&quot;')}" oninput="liveEdit(this)"></div>`;
}
function tog(label, path, val) {
  return `<div class="toggle-row"><span class="toggle-label">${label}</span><div class="toggle ${val?'on':''}" onclick="toggleEdit(this,'${path}')"></div></div>`;
}

// ── Live editing ──
function liveEdit(el) {
  setNestedPath(DATA[currentLP], el.dataset.path, el.value);
  renderCurrent();
}
function toggleEdit(el, path) {
  el.classList.toggle('on');
  setNestedPath(DATA[currentLP], path, el.classList.contains('on'));
  renderCurrent();
}
function setNestedPath(obj, path, val) {
  const parts = path.split('.');
  let cur = obj;
  for (let i = 0; i < parts.length - 1; i++) {
    const p = parts[i];
    if (cur[p] === undefined || cur[p] === null) cur[p] = isNaN(parseInt(parts[i+1])) ? {} : [];
    cur = cur[p];
  }
  cur[parts[parts.length - 1]] = val;
}

function selectLP(idx, el) {
  currentLP = idx;
  document.querySelectorAll('.lp-tab').forEach((t,i) => t.classList.toggle('active', i===idx));
  document.getElementById('browser-url').textContent = LP_URLS[idx];
  const builders = [buildEditor01, buildEditor02, buildEditor03, buildEditor04, buildEditor05];
  document.getElementById('editor-sections').innerHTML = builders[idx](DATA[idx]);
  renderCurrent();
  renderNotes(idx);
}

function resetLP() {
  DATA[currentLP] = JSON.parse(JSON.stringify(DEFAULT_DATA[currentLP]));
  selectLP(currentLP, null);
  toast('Reset to defaults');
}

function toggleDevice() {
  mobileMode = !mobileMode;
  const b = document.getElementById('browser-body');
  const btn = event.currentTarget;
  b.style.maxWidth = mobileMode ? '390px' : '';
  b.style.margin = mobileMode ? '0 auto' : '';
  b.style.borderLeft = mobileMode ? '1px solid #ccc' : '';
  b.style.borderRight = mobileMode ? '1px solid #ccc' : '';
  btn.textContent = mobileMode ? '🖥 Desktop' : '📱 Mobile';
}

function exportHTML() {
  const fns = [r01, r02, r03];
  const names = ['workshop', 'displaced', 'executive', 'careeriq', 'enterprise'];
  const body = fns[currentLP](DATA[currentLP]);
  const html = `<!DOCTYPE html>\n<html lang="en">\n<head>\n<meta charset="UTF-8">\n<meta name="viewport" content="width=device-width,initial-scale=1.0">\n<title>FirstSourceTeam</title>\n<style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif}</style>\n</head>\n<body>\n${body}\n</body>\n</html>`;
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([html], {type:'text/html'}));
  a.download = `fst-lp-${names[currentLP]}.html`;
  a.click();
  toast('Exported ✓', 'success');
}

function toast(msg, type='') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show' + (type ? ' '+type : '');
  setTimeout(() => el.classList.remove('show'), 2500);
}
